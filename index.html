<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast</title>
    <link rel="shortcut icon" href="src/assets/favicon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="src/output.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body
    class="w-full min-h-screen flex flex-col bg-[url(/src/assets/background.png)] bg-cover bg-center bg-fixed transition-all duration-100">
    <!-- header section  -->
    <header class="flex justify-between items-center p-1 flex-row w-full gap-1 h-12 lg:h-16">
        <div class="flex flex-row gap-1 justify-center items-center rounded-xl cursor-pointer lg:gap-2"
            onclick="location.reload()">
            <img src="src/assets/logo.svg" alt="logo" class=" font-extrabold w-20 md:w-20 lg:w-12 xl:w-18">
            <div class="text-amber-100 text-base md:text-xl lg:text-2xl xl:text-3xl">SkyCast</div>
        </div>
        <form class="w-full flex flex-row justify-end p-1 gap-2 lg:w-1/2">
            <input type="text" placeholder="Enter City" id="inputCity"
                class="bg-white/10 backdrop-blur-xl border border-white/40 rounded-xl cursor-pointer p-1.5 text-xs outline-none focus:bg-transparent autofill:bg-transparent focus:outline-none text-amber-100 max-w-150 md:text-sm lg:text-lg xl:text-xl  hover:bg-white/15 placeholder:text-amber-100 w-1/2 h-9 ">
            <button id="searchButton" type="submit"
                class="text-amber-50 bg-white/10 backdrop-blur-xl border border-white/40 rounded-2xl cursor-pointer  px-2 hover:bg-white/15 "><i
                    class="fa-solid fa-magnifying-glass"></i></button>
        </form>
    </header>

    <!-- Header divider line -->
    <div class="h-[0.2rem] w-full bg-amber-300 lg:h-[0.3rem]"></div>

    <!-- main conatiner -->
    <main class="w-full flex-1 flex flex-col transition-all duration-500">
        <!-- loading screen  -->
        <div id="loadingScreen"
            class=" flex w-full h-full justify-center items-center flex-col bg-black/40 backdrop-blur-3xl border border-white/40 fixed inset-0 z-51">
            <img src="src/assets/logo.svg" alt="sunny" class="w-25 md:w-30 lg:w-35 xl:40 animate-pulse">
            <div class="text-slate-100 text-1xl md:text-3xl lg:text-4xl xl:text-4xl font-bold"> Fetching weather data...
            </div>
        </div>

        <!-- 404 error page  -->
        <div id="cityNotFoundPage"
            class="hidden w-full h-full justify-center items-center flex-col bg-black/10 backdrop-blur-3xl border border-white/40 fixed inset-0 z-50">
            <img src="./src/assets/cloud404.svg" alt="404 error" class="w-40 md:w-45 lg:w-50">
            <div class="text-slate-100 text-3xl md:text-5xl lg:text-6xl xl:text-6xl font-black">4O4</div>
            <div class="text-slate-100 text-1xl md:text-3xl lg:text-4xl xl:text-4xl font-bold">Oops! City Not Found
            </div>
            <button onclick="location.reload()"
                class="mt-4 px-6 py-2.5 bg-white text-sky-800 font-medium rounded-xl shadow-m transition cursor-pointer">
                Go Home
            </button>
        </div>

        <!-- something went wrong page -->
        <div id="somethingWentWrongPage"
            class="hidden w-full h-full justify-center items-center flex-col bg-black/10 backdrop-blur-3xl border border-white/40 fixed inset-0 z-50">
            <img src="./src/assets/cloudError.svg" alt="Cloud error" class="w-40 md:w-45 lg:w-50">
            <div class="text-slate-100 text-1xl md:text-3xl lg:text-4xl xl:text-4xl font-bold">Something Went Wrong!
            </div>
            <button id="retrybutton"
                class="mt-4 px-6 py-2.5 bg-white text-sky-800 font-medium rounded-xl shadow-md transition cursor-pointer">
                Try Again
            </button>
        </div>

        <!-- weather data UI section -->
        <div id="wheatherDataContaner" class="w-full m-h-full z-auto p-2 hidden flex-col gap-2">
            <!-- Basic and matrics section  -->
            <div
                class="flex justify-center items-center flex-col bg-black/10 backdrop-blur-xl border p-1 border-white/40 rounded-xl xl:flex-row ">
                <div class=" p-1 flex justify-center items-center flex-col gap-1 w-full">
                    <div class="w-15 md:w-18 lg:w-30 xl:w-35" id="weatherIcon"></div>
                    <div class="text-slate-100 text-3xl md:text-5xl lg:text-6xl xl:text-5xl font-bold flex justify-center items-center"
                        id="temperature"></div>
                    <div class="text-slate-200 text-2xl md:text-3xl lg:text-4xl xl:text-3xl" id="description"></div>
                    <div class="text-slate-200 text-1xl md:text-2xl lg:text-3xl xl:text-2xl" id="location">Sangli, In
                    </div>
                </div>
                <!-- min-max, sunrise-sunset, humidity-pressure section  -->
                <div class="w-full flex justify-center items-center flex-col" id="metricsContainer"></div>
            </div>

            <!-- location card container and weather highlight cards -->
            <div class="w-full h-100 flex gap-2 flex-col items-stretch xl:flex-row">
                <!-- Weather Highlights -->
                <div id="weatherHighlight" class="w-full xl:w-[50%] m-h-full flex gap-2 flex-col"></div>

                <!-- location card  -->
                <div
                    class="bg-black/10 backdrop-blur-xl border p-1 border-white/40 rounded-xl w-full xl:w-[50%] h-25rem xl:h-auto">
                    <iframe id="mapLocation" class="rounded-xl border-0 w-full h-full" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </main>

    <!-- footer section  -->
    <footer class="flex justify-center items-center pb-2 pt-15 lg:p-10">
        <div
            class="bg-black/10 backdrop-blur-xl border py-2 px-3 border-white/40 rounded-xl text-amber-100 shadow-lg flex justify-center items-center gap-4 flex-row">
            <div class="text-2xl"><a href="mailto:rohannkorake@gmail.com" target="_blank"><i
                        class="fa-solid fa-envelope"></i></a></div>
            <div class="text-2xl"><a href="https://github.com/Rohan-Korake" target="_blank"><i
                        class="fa-brands fa-github"></i></a>
            </div>
            <div class="text-2xl"><a href="https://www.linkedin.com/in/rohan-korake-720848342/" target="_blank"><i
                        class="fa-brands fa-linkedin"></i></a></div>
        </div>
    </footer>
</body>
<script type="module" src="src/scripts/main.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</html>
