<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast</title>
    <link rel="shortcut icon" href="src/assets/favicon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body
    class="w-full min-h-screen bg-[url(/src/assets/background.png)] bg-cover bg-center bg-no-repeat transition-all duration-500">
    <header class="flex justify-between items-center p-1 flex-row w-full gap-1 ">
        <div class="flex flex-row gap-1 justify-center items-center rounded-xl cursor-pointer lg:gap-2"
            onclick="location.reload()">
            <img src="src/assets/logo.svg" alt="logo" class=" font-extrabold w-20 md:w-20 lg:w-12 xl:w-18">
            <div class="text-amber-100 text-base md:text-xl lg:text-2xl xl:text-3xl">SkyCast</div>
        </div>
        <form class="w-full flex flex-row justify-end p-1 gap-2 lg:w-1/2">
            <input type="text" placeholder="Enter City" id="inputCity"
                class="bg-white/10 backdrop-blur-xl border border-white/40 rounded-xl cursor-pointer p-1.5 text-xs outline-none focus:outline-none text-amber-100 max-w-150 md:text-sm lg:text-lg xl:text-xl  hover:bg-white/15 placeholder:text-amber-100 w-1/2 h-9">
            <button id="searchButton" type="submit"
                class="text-amber-50 bg-white/10 backdrop-blur-xl border border-white/40 rounded-2xl cursor-pointer  px-2 hover:bg-white/15 "><i
                    class="fa-solid fa-magnifying-glass"></i></button>
        </form>
    </header>
    <div class="h-1 w-full bg-amber-300">
        <div id="progressBar" class="h-full w-5 bg-amber-600"></div>
    </div>
    <main></main>
    <footer></footer>
</body>

<script type="module" src="src/scripts/main.js"></script>

</html>
